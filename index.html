<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Água do Amigo - Gestão 360</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 10px; background: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: #007bff; font-size: 22px; margin-bottom: 20px; }
        
        .abas { display: flex; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .aba { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; transition: 0.3s; }
        .aba.active { background: #007bff; color: #fff; }

        .secao { display: none; }
        .secao.active { display: block; }

        .caixa-form { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        .btn-add { width: 100%; padding: 15px; background: #28a745; color: #fff; font-size: 16px; }
        .btn-venda { background: #007bff; color: #fff; padding: 10px 15px; }
        .btn-perda { background: #dc3545; color: #fff; padding: 8px; font-size: 11px; flex: 1; }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-entrega { border-left: 5px solid #17a2b8; }
        .card-atacado { border-left: 5px solid #fd7e14; }
        .card-estoque { border-left: 5px solid #343a40; }

        .flex-btn { display: flex; justify-content: space-between; align-items: center; }
        .perda-row { display: flex; gap: 5px; margin-top: 10px; }
        
        .total-dia { background: #222; color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .valor-total { display: block; font-size: 32px; color: #44ff7e; font-weight: bold; }
        
        .badge { background: #007bff; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .input-mini { width: 70px !important; text-align: center; margin: 0 5px !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>💧 Água do Amigo</h1>

    <div class="abas">
        <div class="aba active" onclick="guia('loja', this)">LOJA</div>
        <div class="aba" onclick="guia('atacado', this)">ATACADO</div>
        <div class="aba" onclick="guia('entrega', this)">ENTREGA</div>
        <div class="aba" onclick="guia('estoque', this)">ESTOQUE</div>
    </div>

    <div id="loja" class="secao active">
        <div class="caixa-form">
            <strong>Cadastrar Nova Água:</strong>
            <input type="text" id="p_nome" placeholder="Marca (Ex: Indaiá)">
            <input type="number" id="p_preco_loja" placeholder="Preço Loja (Ex: 12)">
            <input type="number" id="p_preco_ent" placeholder="Preço Entrega (Ex: 15)">
            <button class="btn-add" onclick="cadastrarProduto()">SALVAR PRODUTO</button>
        </div>
        <div id="lista_loja"></div>
        <div class="total-dia">TOTAL VENDIDO HOJE<span class="valor-total" id="v_total_geral">R$ 0,00</span></div>
    </div>

    <div id="atacado" class="secao">
        <div class="caixa-form">
            <strong>Novo Cliente de Atacado:</strong>
            <input type="text" id="a_cliente" placeholder="Nome do Cliente">
            <select id="a_select_p"></select>
            <input type="number" id="a_preco_cli" placeholder="Preço p/ este cliente (Ex: 9.50)">
            <button class="btn-add" style="background:#fd7e14" onclick="cadastrarAtacado()">SALVAR CLIENTE</button>
        </div>
        <div id="lista_atacado"></div>
    </div>

    <div id="entrega" class="secao">
        <div class="caixa-form">
            <strong>Novo Cliente Entrega:</strong>
            <input type="text" id="e_nome" placeholder="Nome">
            <input type="text" id="e_end" placeholder="Endereço">
            <select id="e_select_p"></select>
            <button class="btn-add" style="background:#17a2b8" onclick="cadastrarEntrega()">SALVAR CLIENTE</button>
        </div>
        <div id="lista_entrega"></div>
    </div>

    <div id="estoque" class="secao">
        <h3 style="text-align:center">Controle de Pátio e Perdas</h3>
        <div id="lista_estoque"></div>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" style="background:#000; color:#fff; padding:12px; width:100%; border-radius:8px;">📄 GERAR RELATÓRIO</button>
        <button onclick="limpezaForcada()" style="color:red; background:none; margin-top:15px; font-size:12px; text-decoration:underline;">⚠️ Limpar tudo e reiniciar sistema</button>
    </div>
</div>

<script>
    // Banco de dados (p=produtos, a=atacado, c=clientes)
    let db = JSON.parse(localStorage.getItem('AGUA_DB_V7')) || { p: [], a: [], c: [] };

    function guia(id, el) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        atualizar();
    }

    function atualizar() {
        localStorage.setItem('AGUA_DB_V7', JSON.stringify(db));
        
        const lLoja = document.getElementById('lista_loja'), lAta = document.getElementById('lista_atacado');
        const lEnt = document.getElementById('lista_entrega'), lEst = document.getElementById('lista_estoque');
        const selA = document.getElementById('a_select_p'), selE = document.getElementById('e_select_p');

        lLoja.innerHTML = lAta.innerHTML = lEnt.innerHTML = lEst.innerHTML = '';
        selA.innerHTML = selE.innerHTML = '<option value="">Selecione a Água...</option>';

        let faturamento = 0;

        // Render Produtos
        db.p.forEach((i, idx) => {
            faturamento += (i.v_loja * i.pLoja) + (i.v_ent * i.pEnt) + (i.v_ata_total);

            lLoja.innerHTML += `<div class="card flex-btn">
                <div><b>${i.n}</b><br><small>Loja: R$ ${i.pLoja.toFixed(2)}</small></div>
                <div><span class="badge">Estoque: ${i.qtd}</span> <button class="btn-venda" onclick="vendaLoja(${idx})">+1</button></div>
            </div>`;

            lEst.innerHTML += `<div class="card card-estoque">
                <div class="flex-btn">
                    <b>${i.n}</b>
                    <div>
                        <button onclick="mudarQtd(${idx}, -1)">-</button>
                        <input type="number" class="input-mini" value="${i.qtd}" onchange="setarQtd(${idx}, this.value)">
                        <button onclick="mudarQtd(${idx}, 1)">+</button>
                    </div>
                </div>
                <div class="perda-row">
                    <button class="btn-perda" onclick="perda(${idx}, 'f')">🚩 FURADO (${i.furos})</button>
                    <button class="btn-perda" onclick="perda(${idx}, 'v')">⌛ VENCIDO (${i.vencidos})</button>
                </div>
            </div>`;

            selA.innerHTML += `<option value="${idx}">${i.n}</option>`;
            selE.innerHTML += `<option value="${idx}">${i.n}</option>`;
        });

        // Render Atacado (Preço por cliente)
        db.a.forEach((cli, idx) => {
            lAta.innerHTML += `<div class="card card-atacado">
                <b>${cli.nome}</b> <small>(${db.p[cli.pIdx].n})</small><br>
                <small>Combinado: R$ ${cli.preco.toFixed(2)}</small>
                <div class="flex-btn" style="margin-top:10px">
                    <input type="number" id="qtd_ata_${idx}" class="input-mini" placeholder="Qtd" style="width:100px !important; text-align:left">
                    <button class="btn-venda" style="background:#fd7e14" onclick="vendaAtacado(${idx})">VENDER</button>
                </div>
            </div>`;
        });

        // Render Entrega
        db.c.forEach((cli, idx) => {
            lEnt.innerHTML += `<div class="card card-entrega">
                <b>${cli.nome}</b> <small>(${db.p[cli.pIdx].n})</small><br>
                <small>📍 ${cli.end}</small>
                <button class="btn-add" style="background:#17a2b8; margin-top:10px; padding:8px" onclick="vendaEntrega(${idx})">+1 ENTREGA</button>
            </div>`;
        });

        document.getElementById('v_total_geral').innerText = "R$ " + faturamento.toFixed(2);
    }

    // CADASTROS
    function cadastrarProduto() {
        const n = document.getElementById('p_nome').value;
        const pl = parseFloat(document.getElementById('p_preco_loja').value);
        const pe = parseFloat(document.getElementById('p_preco_ent').value);
        if(n && pl) {
            db.p.push({ n, pLoja: pl, pEnt: pe, qtd: 0, v_loja: 0, v_ent: 0, v_ata_total: 0, furos: 0, vencidos: 0 });
            document.getElementById('p_nome').value = '';
            atualizar();
        } else alert("Preencha o nome e preço da loja!");
    }

    function cadastrarAtacado() {
        const nome = document.getElementById('a_cliente').value;
        const pIdx = document.getElementById('a_select_p').value;
        const preco = parseFloat(document.getElementById('a_preco_cli').value);
        if(nome && pIdx !== "" && preco) {
            db.a.push({ nome, pIdx: parseInt(pIdx), preco });
            document.getElementById('a_cliente').value = '';
            atualizar();
        } else alert("Preencha todos os campos do atacado!");
    }

    function cadastrarEntrega() {
        const nome = document.getElementById('e_nome').value;
        const end = document.getElementById('e_end').value;
        const pIdx = document.getElementById('e_select_p').value;
        if(nome && pIdx !== "") {
            db.c.push({ nome, end, pIdx: parseInt(pIdx) });
            document.getElementById('e_nome').value = '';
            atualizar();
        } else alert("Preencha nome e escolha a água!");
    }

    // VENDAS E ESTOQUE
    function vendaLoja(idx) {
        if(db.p[idx].qtd > 0) { db.p[idx].v_loja++; db.p[idx].qtd--; atualizar(); } else alert("Sem estoque!");
    }

    function vendaAtacado(idx) {
        const q = parseInt(document.getElementById(`qtd_ata_${idx}`).value);
        const cli = db.a[idx];
        const prod = db.p[cli.pIdx];
        if(q > 0 && prod.qtd >= q) {
            prod.v_ata_total += (q * cli.preco);
            prod.qtd -= q;
            atualizar();
        } else alert("Quantidade inválida ou sem estoque!");
    }

    function vendaEntrega(idx) {
        const cli = db.c[idx];
        const prod = db.p[cli.pIdx];
        if(prod.qtd > 0) { prod.v_ent++; prod.qtd--; atualizar(); } else alert("Sem estoque!");
    }

    function perda(idx, tipo) {
        if(db.p[idx].qtd > 0) {
            if(tipo === 'f') db.p[idx].furos++; else db.p[idx].vencidos++;
            db.p[idx].qtd--;
            atualizar();
        }
    }

    function mudarQtd(idx, val) { db.p[idx].qtd += val; atualizar(); }
    function setarQtd(idx, val) { db.p[idx].qtd = parseInt(val) || 0; atualizar(); }

    function limpezaForcada() {
        if(confirm("Isso apagará todos os dados. Confirma?")) {
            localStorage.clear();
            location.reload();
        }
    }

    atualizar();
</script>
</body>
</html>
