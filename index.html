<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Água do Amigo - Gestão Total</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 480px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #007bff; text-align: center; margin-top: 0; font-size: 22px; }
        
        .tabs { display: flex; margin-bottom: 15px; border: 1px solid #007bff; border-radius: 8px; overflow: hidden; }
        .tab { flex: 1; padding: 12px; border: none; background: white; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab.active { background: #007bff; color: white; }
        
        .painel { display: none; }
        .painel.active { display: block; }

        .add-box { background: #eef2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { cursor: pointer; border-radius: 5px; font-weight: bold; border: none; transition: 0.2s; }
        
        .btn-add { background: #28a745; color: white; width: 100%; padding: 12px; }
        .linha { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-venda { background: #007bff; color: white; padding: 10px; min-width: 80px; }
        
        .cliente-card { background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #28a745; }
        .progresso { background: #ddd; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .barra { background: #28a745; height: 100%; width: 0%; transition: 0.4s; }
        
        .btn-fidelidade { background: #28a745; color: white; width: 100%; padding: 12px; font-size: 15px; }
        .brinde { background: #ffc107; color: black; animation: blink 1s infinite; font-size: 16px; }

        .footer { background: #333; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .total { font-size: 28px; color: #44ff7e; display: block; font-weight: bold; }
        
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h1>💧 Água do Amigo</h1>

    <div class="tabs no-print">
        <button class="tab active" onclick="mudarAba('vendas', this)">VENDAS LOJA</button>
        <button class="tab" onclick="mudarAba('fidelidade', this)">ENTREGA (FIDELIDADE)</button>
    </div>

    <div id="vendas" class="painel active">
        <div class="add-box no-print">
            <strong>Cadastrar Produto:</strong>
            <input type="text" id="p-nome" placeholder="Ex: Galão 20L">
            <input type="text" id="p-preco-loja" placeholder="Preço na Loja (Ex: 8,00)">
            <input type="text" id="p-preco-entrega" placeholder="Preço Entrega (Ex: 12,00)">
            <button class="btn-add" onclick="novoProduto()">+ SALVAR PRODUTO</button>
        </div>
        <div id="lista-produtos"></div>
    </div>

    <div id="fidelidade" class="painel">
        <div class="add-box no-print">
            <strong>Novo Cliente:</strong>
            <input type="text" id="c-nome" placeholder="Nome do Cliente">
            <select id="c-tipo-agua">
                <option value="">Selecione a água que ele compra...</option>
            </select>
            <button class="btn-add" style="background:#17a2b8" onclick="novoCliente()">+ CADASTRAR CLIENTE</button>
        </div>
        <div id="lista-clientes"></div>
    </div>

    <div class="footer">
        VALOR TOTAL DO DIA
        <span class="total" id="valor-total">R$ 0,00</span>
    </div>

    <div class="no-print" style="margin-top:15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="window.print()" style="padding:12px; background:#6c757d; color:white;">📄 PDF</button>
        <button onclick="exportar()" style="padding:12px; background:#eee;">📤 Exportar</button>
        <button onclick="zerarVendas()" style="grid-column: span 2; margin-top:10px; background:none; color:red; font-size:12px; border: 1px solid red; padding: 5px;">Zerar Apenas Vendas do Dia</button>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('agua_v4_prod')) || [];
    let clientes = JSON.parse(localStorage.getItem('agua_v4_cli')) || [];
    let totalEntregasR$ = JSON.parse(localStorage.getItem('agua_v4_soma_entrega')) || 0;

    function mudarAba(id, btn) {
        document.querySelectorAll('.painel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function atualizarTela() {
        // Atualiza Lista de Vendas Loja
        const listaP = document.getElementById('lista-produtos');
        listaP.innerHTML = '';
        let somaLoja = 0;
        
        produtos.forEach((p, i) => {
            somaLoja += (p.vendas * p.precoLoja);
            listaP.innerHTML += `
                <div class="linha">
                    <div><b>${p.nome}</b><br
