<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Água do Amigo - Gestão & Fidelidade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #007bff; text-align: center; margin-bottom: 5px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #007bff; color: white; }
        
        .section { display: none; }
        .section.active { display: block; }

        /* Estilo da Fidelidade */
        .cliente-item { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .progress-bg { background: #e9ecef; height: 8px; width: 100%; border-radius: 5px; margin-top: 5px; }
        .progress-bar { background: #28a745; height: 100%; border-radius: 5px; transition: 0.3s; }
        .btn-carimbo { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; }
        .ganhou-brinde { background: #ffc107 !important; color: #000 !important; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* Estilos de Venda (Igual anterior) */
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-vender { background: #007bff; color: white; padding: 10px 15px; border:none; border-radius: 5px; }
        .resumo { background: #343a40; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .total-valor { font-size: 24px; color: #44ff7e; display: block; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .btn-sync { background: #17a2b8; color: white; width: 100%; padding: 12px; border:none; border-radius: 5px; margin-top: 10px; font-weight: bold; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="card">
    <h1>💧 Água do Amigo</h1>
    
    <div class="tabs no-print">
        <button class="tab-btn active" onclick="openTab('vendas')">VENDAS</button>
        <button class="tab-btn" onclick="openTab('fidelidade')">FIDELIDADE (10+1)</button>
    </div>

    <div id="vendas" class="section active">
        <div class="no-print" style="background:#f0f4f8; padding:10px; border-radius:10px; margin-bottom:10px;">
            <input type="text" id="n-prod" placeholder="Produto">
            <input type="text" id="n-preco" placeholder="Preço (Ex: 10,00)">
            <button onclick="addProd()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; font-weight:bold;">+ CADASTRAR</button>
        </div>
        <div id="lista-vendas"></div>
        <div class="resumo">TOTAL: <span class="total-valor" id="total-geral">R$ 0,00</span></div>
    </div>

    <div id="fidelidade" class="section">
        <div class="no-print">
            <input type="text" id="n-cliente" placeholder="Nome do Cliente">
            <button onclick="addCliente()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; font-weight:bold;">CADASTRAR CLIENTE</button>
        </div>
        <div id="lista-clientes" style="margin-top:15px;"></div>
    </div>

    <div class="no-print">
        <button class="btn-sync" onclick="exportar()">📤 Celular > PC (Exportar)</button>
        <button class="btn-sync" style="background:#6c757d" onclick="document.getElementById('fin').click()">📥 Importar no PC</button>
        <input type="file" id="fin" style="display:none" onchange="importar(this)">
        <button onclick="window.print()" style="width:100%; padding:12px; margin-top:10px; border-radius:5px; border:1px solid #333; font-weight:bold;">📄 GERAR PDF</button>
        <button onclick="zerarTudo()" style="width:100%; color:red; background:none; border:none; margin-top:15px; font-size:11px;">Limpar Tudo</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('agua_db')) || [];
    let clientes = JSON.parse(localStorage.getItem('agua_clientes')) || [];

    function openTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function render() {
        // Render Vendas
        const vDiv = document.getElementById('lista-vendas');
        vDiv.innerHTML = '';
        let total = 0;
        db.forEach((p, i) => {
            total += (p.vendas * p.preco);
            vDiv.innerHTML += `<div class="item">
                <span><b>${p.nome}</b><br><small>R$ ${p.preco.toFixed(2)}</small></span>
                <div class="controles">
                    <span style="font-size:18px; margin-right:10px;">${p.vendas}</span>
                    <button class="btn-vender" onclick="vender(${i})">+1</button>
                    <button onclick="removerProd(${i})" style="color:red; background:none; border:none; margin-left:10px;">X</button>
                </div>
            </div>`;
        });
        document.getElementById('total-geral').innerText = "R$ " + total.toFixed(2).replace('.',',');

        // Render Fidelidade
        const cDiv = document.getElementById('lista-clientes');
        cDiv.innerHTML = '';
        clientes.forEach((c, i) => {
            let isBrinde = c.compras >= 10;
            cDiv.innerHTML += `<div class="cliente-item">
                <div style="flex:1; margin-right:10px;">
                    <b>${c.nome}</b>
                    <div class="progress-bg"><div class="progress-bar" style="width:${(c.compras/10)*100}%"></div></div>
                    <small>${c.compras}/10 águas</small>
                </div>
                <button class="btn-carimbo ${isBrinde ? 'ganhou-brinde' : ''}" onclick="carimbar(${i})">
                    ${isBrinde ? 'BRINDE! 🎁' : '+1 Água'}
                </button>
                <button onclick="removerCli(${i})" style="color:red; background:none; border:none; margin-left:5px;">X</button>
            </div>`;
        });

        localStorage.setItem('agua_db', JSON.stringify(db));
        localStorage.setItem('agua_clientes', JSON.stringify(clientes));
    }

    function addProd() {
        let n = document.getElementById('n-prod').value;
        let p = parseFloat(document.getElementById('n-preco').value.replace(',','.'));
        if(n && p) { db.push({nome:n, preco:p, vendas:0}); render(); }
    }
    function vender(i) { db[i].vendas++; render(); }
    function removerProd(i) { if(confirm("Excluir produto?")) {db.splice(i,1); render();} }

    function addCliente() {
        let n = document.getElementById('n-cliente').value;
        if(n) { clientes.push({nome:n, compras:0}); document.getElementById('n-cliente').value=''; render(); }
    }
    function carimbar(i) {
        if(clientes[i].compras >= 10) {
            if(confirm("Entregar a água GRÁTIS e zerar o cartão?")) { clientes[i].compras = 0; }
        } else { clientes[i].compras++; }
        render();
    }
    function removerCli(i) { if(confirm("Excluir cliente?")) {clientes.splice(i,1); render();} }

    function exportar() {
        const blob = new Blob([JSON.stringify({db, clientes})], {type:"application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "vendas_fidelidade.txt";
        a.click();
    }
    function importar(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            db = data.db; clientes = data.clientes;
            render(); alert("Sincronizado!");
        };
        reader.readAsText(input.files[0]);
    }
    function zerarTudo() { if(confirm("Isso apaga TUDO (Produtos e Clientes). Tem certeza?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
    render();
</script>
</body>
</html>
