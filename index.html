<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Água do Amigo - O Bruto 1113</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* CORES MERCEDES 1113 */
        :root {
            --azul-mercedes: #004a99;
            --faixa-azul: #007bff;
            --chassi-cinza: #333;
            --fundo: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background: var(--fundo); color: #333; }
        
        /* HEADER COM O CAMINHÃO */
        .header-caminhao {
            background: var(--azul-mercedes);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
            border-bottom: 8px solid var(--faixa-azul); /* A famosa faixa azul */
            margin-bottom: 0;
        }
        
        .img-caminhao {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid white;
        }

        .container { background: #fff; max-width: 480px; margin: auto; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        .conteudo { padding: 15px; }

        /* ABAS */
        .abas { display: flex; background: #eee; padding: 5px; gap: 5px; }
        .aba { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: var(--chassi-cinza); transition: 0.3s; }
        .aba.active { background: var(--azul-mercedes); color: white; }

        .secao { display: none; padding: 10px 0; }
        .secao.active { display: block; }

        /* CARDS E INPUTS */
        .card { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--azul-mercedes); outline: none; }

        /* BOTÕES */
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        .btn-principal { width: 100%; padding: 15px; background: #28a745; color: white; font-size: 16px; margin-top: 5px; }
        .btn-add { background: var(--azul-mercedes); color: white; padding: 8px 15px; font-size: 18px; }
        .btn-sub { background: #dc3545; color: white; padding: 8px 15px; font-size: 18px; }

        /* ESTOQUE DIGITÁVEL */
        .input-estoque { width: 70px !important; text-align: center; font-size: 20px !important; font-weight: bold; margin: 0 5px !important; border: 2px solid var(--azul-mercedes) !important; }

        .item-flex { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        /* CAIXA TOTAL */
        .caixa-total { background: var(--chassi-cinza); color: #fff; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .valor { font-size: 35px; color: #44ff7e; font-weight: bold; display: block; }

        .fidelidade-barra { background: #eee; height: 15px; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .fidelidade-fill { background: #28a745; height: 100%; width: 0%; transition: 0.5s; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-caminhao">
        <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&q=80&w=400" alt="Mercedes 1113" class="img-caminhao">
        <div style="font-size: 20px; font-weight: bold;">DISPENSÁRIO ÁGUA DO AMIGO</div>
        <div style="font-size: 12px; opacity: 0.9;">O Bruto das Entregas - Mercedes 1113</div>
    </div>

    <div class="abas no-print">
        <div class="aba active" onclick="tab('loja', this)">LOJA</div>
        <div class="aba" onclick="tab('entregas', this)">ENTREGAS</div>
        <div class="aba" onclick="tab('estoque', this)">ESTOQUE</div>
    </div>

    <div class="conteudo">
        <div id="loja" class="secao active">
            <div class="card no-print">
                <input type="text" id="p_n" placeholder="Nome da Água (Ex: Bonafont)">
                <input type="number" id="p_l" placeholder="Preço Loja">
                <input type="number" id="p_e" placeholder="Preço Entrega">
                <button class="btn-principal" onclick="addProduto()">CADASTRAR MARCA</button>
            </div>
            <div id="lista_loja"></div>
            <div class="caixa-total">
                VALOR EM CAIXA HOJE
                <span class="valor" id="v_total">R$ 0,00</span>
            </div>
        </div>

        <div id="entregas" class="secao">
            <div class="card no-print">
                <input type="text" id="c_n" placeholder="Nome do Cliente">
                <select id="c_p"></select>
                <button class="btn-principal" style="background: var(--faixa-azul);" onclick="addCliente()">CADASTRAR CLIENTE</button>
            </div>
            <div id="lista_clientes"></div>
        </div>

        <div id="estoque" class="secao">
            <div class="card">
                <h3 style="margin-top:0; color: var(--azul-mercedes);">🚛 Carga de Cheios</h3>
                <div id="estoque_cheios"></div>
            </div>
            
            <div class="card">
                <h3 style="color: #666;">🔄 Retorno de Vazios</h3>
                <div class="item-flex">
                    <span>Geral Vazios</span>
                    <div>
                        <button class="btn-sub" onclick="setEstGeral('v', -1)">-</button>
                        <input type="number" id="inp_v" class="input-estoque" onchange="digitaEstGeral('v', this.value)">
                        <button class="btn-add" onclick="setEstGeral('v', 1)">+</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="color: #dc3545;">⚠️ Galões Quebrados</h3>
                <div class="item-flex">
                    <span>Perdas/Furos</span>
                    <div>
                        <button class="btn-sub" onclick="setEstGeral('q', -1)">-</button>
                        <input type="number" id="inp_q" class="input-estoque" onchange="digitaEstGeral('q', this.value)">
                        <button class="btn-add" onclick="setEstGeral('q', 1)">+</button>
                    </div>
                </div>
            </div>

            <div class="caixa-total" style="background: var(--azul-mercedes);">
                PATRIMÔNIO TOTAL (CASCOS)
                <span class="valor" id="cascos_total" style="color: #fff;">0</span>
            </div>
        </div>
    </div>

    <div class="conteudo no-print">
        <button class="btn-principal" style="background:#000;" onclick="window.print()">📄 RELATÓRIO PDF</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="exportar()" style="flex:1; padding:10px; font-size:11px;">📤 BACKUP</button>
            <button onclick="document.getElementById('f').click()" style="flex:1; padding:10px; font-size:11px;">📥 RESTAURAR</button>
            <input type="file" id="f" style="display:none" onchange="importar(this)">
        </div>
        <p onclick="zerarDia()" style="text-align:center; color:red; font-size:12px; text-decoration:underline; cursor:pointer; margin-top:20px;">Zerar Caixa e Vendas do Dia</p>
    </div>
</div>

<script>
    // Recupera dados das versões anteriores para não perder nada
    let db = JSON.parse(localStorage.getItem('AGUA_DATA_FINAL')) || 
             JSON.parse(localStorage.getItem('AGUA_DATA_FINAL_1113')) || 
             { p: [], c: [], cx: 0, est: { v: 0, q: 0 } };

    function tab(id, el) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        render();
    }

    function render() {
        localStorage.setItem('AGUA_DATA_FINAL', JSON.stringify(db));
        
        // Render Loja
        const lLoja = document.getElementById('lista_loja');
        lLoja.innerHTML = '';
        let totalDinheiro = db.cx;
        
        db.p.forEach((item, i) => {
            if(item.v === undefined) item.v = 0; // vendas loja
            if(item.e === undefined) item.e = 0; // vendas entrega
            if(item.ch === undefined) item.ch = 0; // estoque cheio
            
            totalDinheiro += (item.v * item.pl);
            lLoja.innerHTML += `
                <div class="item-flex" style="background:#fff; margin-bottom:5px; border-radius:8px; border:1px solid #eee">
                    <div><b>${item.n}</b><br><small>Saídas: ${item.v + item.e}</small></div>
                    <div>
                        <span style="font-weight:bold; font-size:18px; margin-right:10px;">${item.v}</span>
                        <button class="btn-add" onclick="vendaLoja(${i})">+1</button>
                    </div>
                </div>`;
        });
        document.getElementById('v_total').innerText = "R$ " + totalDinheiro.toFixed(2).replace('.',',');

        // Render Select Clientes
        const sel = document.getElementById('c_p');
        sel.innerHTML = '<option value="">Escolha a marca do cliente...</option>';
        db.p.forEach((item, i) => { sel.innerHTML += `<option value="${i}">${item.n}</option>`; });

        // Render Clientes
        const lCli = document.getElementById('lista_clientes');
        lCli.innerHTML = '';
        db.c.forEach((cli, i) => {
            let prod = db.p[cli.pi];
            let prontoBrinde = cli.pts >= 10;
            lCli.innerHTML += `
                <div class="card">
                    <b>${cli.n}</b> <small>(${prod ? prod.n : '?'})</small>
                    <div class="fidelidade-barra"><div class="fidelidade-fill" style="width:${(cli.pts/10)*100}%"></div></div>
                    <button class="btn-principal ${prontoBrinde ? 'active' : ''}" 
                            style="background: ${prontoBrinde ? '#ffc107' : '#28a745'}; color: ${prontoBrinde ? '#000' : '#fff'}" 
                            onclick="vendaEntrega(${i})">
                        ${prontoBrinde ? '🎁 ENTREGAR BRINDE!' : '+1 ENTREGA (R$ ' + (prod ? prod.pe.toFixed(2) : '0') + ')'}
                    </button>
                    <button onclick="delCli(${i})" style="background:none; color:red; font-size:10px; margin-top:10px; width:100%">Excluir Cliente</button>
                </div>`;
        });

        // Render Estoque
        const lEst = document.getElementById('estoque_cheios');
        lEst.innerHTML = '';
        let totalCheios = 0;
        db.p.forEach((item, i) => {
            totalCheios += (item.ch || 0);
            lEst.innerHTML += `
                <div class="item-flex">
                    <span><b>${item.n}</b></span>
                    <div>
                        <button class="btn-sub" onclick="setCheio(${i}, -1)">-</button>
                        <input type="number" class="input-estoque" value="${item.ch}" onchange="digitaCheio(${i}, this.value)">
                        <button class="btn-add" onclick="setCheio(${i}, 1)">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('inp_v').value = db.est.v;
        document.getElementById('inp_q').value = db.est.q;
        document.getElementById('cascos_total').innerText = totalCheios + db.est.v + db.est.q;
    }

    // AÇÕES
    function addProduto() {
        let n = document.getElementById('p_n').value;
        let l = parseFloat(document.getElementById('p_l').value);
        let e = parseFloat(document.getElementById('p_e').value);
        if(n && l && e) {
            db.p.push({n:n, pl:l, pe:e, v:0, e:0, ch:0});
            render();
        }
    }

    function addCliente() {
        let n = document.getElementById('c_n').value;
        let p = document.getElementById('c_p').value;
        if(n && p !== "") {
            db.c.push({n:n, pi:parseInt(p), pts:0});
            render();
        }
    }

    function vendaLoja(i) { db.p[i].v++; render(); }
    
    function vendaEntrega(i) {
        let c = db.c[i];
        let p = db.p[c.pi];
        if(c.pts >= 10) {
            if(confirm("Zerar pontos e entregar brinde?")) { c.pts = 0; if(p) p.e++; }
        } else {
            c.pts++; if(p) { db.cx += p.pe; p.e++; }
        }
        render();
    }

    // Funções de Estoque
    function setCheio(i, qtd) { if(db.p[i].ch + qtd >= 0) db.p[i].ch += qtd; render(); }
    function digitaCheio(i, v) { db.p[i].ch = parseInt(v) || 0; render(); }
    function setEstGeral(t, qtd) { if(db.est[t] + qtd >= 0) db.est[t] += qtd; render(); }
    function digitaEstGeral(t, v) { db.est[t] = parseInt(v) || 0; render(); }

    function delCli(i) { if(confirm("Remover cliente?")) { db.c.splice(i,1); render(); } }
    
    function zerarDia() {
        if(confirm("Isso vai zerar as vendas de hoje e o dinheiro em caixa. O estoque de cascos e os clientes continuam. Confirma?")) {
            db.p.forEach(x => { x.v = 0; x.e = 0; });
            db.cx = 0;
            render();
        }
    }

    function exportar() {
        const blob = new Blob([JSON.stringify(db)], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'backup_agua.txt'; a.click();
    }

    function importar(input) {
        const reader = new FileReader();
        reader.onload = function() { db = JSON.parse(reader.result); render(); alert("Dados restaurados!"); };
        reader.readAsText(input.files[0]);
    }

    render();
</script>
</body>
</html>
