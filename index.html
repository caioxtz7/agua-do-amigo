<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Água do Amigo - Gestão v31</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* --- CORES PADRÃO (MODO CLARO) --- */
        :root {
            --bg-principal: #f0f2f5;
            --bg-container: #ffffff;
            --texto-principal: #333333;
            --bg-caixa-form: #f8f9fa;
            --border-caixa-form: #dddddd;
            --bg-card: #ffffff;
            --border-card: #eeeeee;
            --texto-pequeno: #666666;
            --bg-abas: #eee;
            --texto-abas: #555;
            --bg-total-box: #1c1e21;
        }

        /* --- CORES DO MODO ESCURO (PRETO) --- */
        body.dark-mode {
            --bg-principal: #121214;
            --bg-container: #202024;
            --texto-principal: #e1e1e6;
            --bg-caixa-form: #29292e;
            --border-caixa-form: #323238;
            --bg-card: #29292e;
            --border-card: #323238;
            --texto-pequeno: #a8a8b3;
            --bg-abas: #121214;
            --texto-abas: #a8a8b3;
            --bg-total-box: #121214;
        }

        /* --- ESTILOS --- */
        body { font-family: system-ui, sans-serif; margin: 0; padding: 10px; background: var(--bg-principal); color: var(--texto-principal); transition: background 0.3s, color 0.3s; }
        .container { max-width: 550px; margin: auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h1 { text-align: center; color: #007bff; font-size: 22px; margin-bottom: 15px; }
        
        .btn-tema { position: absolute; top: 15px; right: 15px; background: #eee; color: #333; padding: 6px 12px; font-size: 12px; border-radius: 20px; font-weight: bold; }
        body.dark-mode .btn-tema { background: #121214; color: #fff; border: 1px solid #323238; }

        .abas { display: flex; gap: 4px; background: var(--bg-abas); padding: 5px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .aba { flex: 1; min-width: 70px; padding: 12px 2px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; color: var(--texto-abas); }
        .aba.active { background: #007bff; color: #fff; }

        .secao { display: none; }
        .secao.active { display: block; }

        .caixa-form { background: var(--bg-caixa-form); border: 1px solid var(--border-caixa-form); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: var(--bg-card); color: var(--texto-principal); }
        
        .venda-avulsa { background: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .venda-avulsa b { display: block; margin-bottom: 8px; font-size: 13px; color: #856404; }
        body.dark-mode .venda-avulsa { background: #2e2b1d; border: 1px solid #4d4416; }
        body.dark-mode .venda-avulsa b { color: #ffdb58; }

        .busca-container { margin-bottom: 15px; position: sticky; top: 0; z-index: 5; background: var(--bg-container); padding: 10px 0; border-bottom: 1px solid var(--border-card); }
        .input-busca { border: 2px solid #007bff !important; background: var(--bg-principal); margin: 0; }

        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-verde { width: 100%; padding: 15px; background: #28a745; color: #fff; font-size: 16px; }
        
        .card { border: 1px solid var(--border-card); padding: 15px; border-radius: 10px; margin-bottom: 10px; background: var(--bg-card); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        
        .info-vendas { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border-card); font-size: 11px; color: var(--texto-pequeno); display: flex; flex-wrap: wrap; gap: 8px; }

        .card-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-card); display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
        .btn-acao { background: none; border: none; padding: 5px 8px; font-size: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-acao.edit { color: #007bff; background: #e7f1ff; }
        .btn-acao.del { color: #dc3545; background: #ffebee; }
        .btn-acao.zap { color: #25d366; background: #e8f9ee; }
        .btn-acao.pagar { color: #fd7e14; background: #fff3cd; }
        
        body.dark-mode .btn-acao.edit { color: #4da6ff; background: #19222d; }
        body.dark-mode .btn-acao.del { color: #f75a68; background: #2d191a; }
        body.dark-mode .btn-acao.zap { color: #60e691; background: #162a1e; }
        body.dark-mode .btn-acao.pagar { color: #ffb066; background: #2e2419; }

        .total-box { background: var(--bg-total-box); color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 15px; }
        body.dark-mode .total-box { border: 1px solid #323238; }
        .valor-total { display: block; font-size: 32px; color: #44ff7e; font-weight: bold; }

        #notificacao {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-50px);
            background: #28a745; color: white; padding: 12px 25px; border-radius: 30px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999;
            opacity: 0; transition: all 0.3s ease; pointer-events: none; font-size: 14px;
        }
        #notificacao.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .item-historico { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-card); font-size: 14px; }
        .item-historico:last-child { border-bottom: none; }
        .hist-hora { color: var(--texto-pequeno); font-size: 11px; }
        .hist-tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #fff; }
        .tag-balcao { background: #007bff; }
        .tag-entrega { background: #17a2b8; }
        .tag-atacado { background: #fd7e14; }
        .tag-recebimento { background: #28a745; }

        .btn-backup { background: #6c757d; color: white; padding: 10px; font-size: 13px; border-radius: 8px; flex: 1; text-align: center; }
